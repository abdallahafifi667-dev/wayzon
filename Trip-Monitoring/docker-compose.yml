services:
  redis:
    image: redis:7-alpine
    container_name: trip-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - trip_redis_data:/data
    restart: always

  ml-brain:
    build:
      context: ../mlBrainpy
      dockerfile: Dockerfile
    container_name: ml-brain
    ports:
      - "8001:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - ML_BRAIN_PRODUCTION=true
      - ML_BRAIN_ENABLED=true
    depends_on:
      - redis
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  trip_redis_data:
  
